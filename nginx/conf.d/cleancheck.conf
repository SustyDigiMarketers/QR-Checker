# CleanCheck Nginx Server Block Configuration

server {
    listen 80;
    listen [::]:80;
    server_name localhost ${DOMAIN_NAME};

    # Let's Encrypt certbot ACME challenge route
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost ${DOMAIN_NAME};

    # SSL Cert details - pointing to mapped Let's Encrypt certificates or local dummy certs
    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;

    # SSL Security Enhancements
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (Strict-Transport-Security) Header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Secure Cookie Settings, Frame options, XSS protection headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size limit matching cleancheck server body limit
    client_max_body_size 15M;

    # Root location forwarding requests to CleanCheck container
    location / {
        proxy_pass http://cleancheck:3000;
        proxy_http_version 1.1;
        
        # Connection upgrades for WebSocket connections
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Target metadata headers for IP tracking and route resolution
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer configurations to optimize API transactions under scaling load
        proxy_buffering off;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }
}
