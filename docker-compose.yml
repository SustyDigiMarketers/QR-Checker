version: '3.8'

services:
  cleancheck:
    image: cleancheck:v1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleancheck_platform
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
    volumes:
      - ./assets:/app/assets
      - ./uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
